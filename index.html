<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HeinoPeter">
    <title>HeinoPeter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .list-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .list-item h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .list-item p {
            color: #666;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .tab.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 HeinoPeter</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('add')">Hinzufügen</button>
            <button class="tab" onclick="switchTab('list')">Liste</button>
        </div>

        <div id="add-tab" class="tab-content active">
            <div class="card">
                <div id="status-message"></div>
                
                <div class="input-group">
                    <label for="title">Titel</label>
                    <input type="text" id="title" placeholder="Titel eingeben...">
                </div>

                <div class="input-group">
                    <label for="description">Beschreibung</label>
                    <textarea id="description" placeholder="Beschreibung eingeben..."></textarea>
                </div>

                <button onclick="saveItem()">Speichern</button>
            </div>
        </div>

        <div id="list-tab" class="tab-content">
            <div class="card">
                <div id="items-list"></div>
            </div>
        </div>
    </div>

    <script>
        let items = [];

        // Daten beim Start laden
        async function loadItems() {
            try {
                const result = await window.storage.list('item:');
                if (result && result.keys) {
                    items = [];
                    for (const key of result.keys) {
                        try {
                            const data = await window.storage.get(key);
                            if (data && data.value) {
                                items.push(JSON.parse(data.value));
                            }
                        } catch (e) {
                            // Item existiert nicht
                        }
                    }
                    displayItems();
                }
            } catch (error) {
                // Keine Items vorhanden
                displayItems();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'add') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('add-tab').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('list-tab').classList.add('active');
                displayItems();
            }
        }

        async function saveItem() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!title) {
                showStatus('Bitte einen Titel eingeben', 'error');
                return;
            }

            const item = {
                id: Date.now(),
                title: title,
                description: description,
                timestamp: new Date().toLocaleString('de-DE')
            };

            try {
                await window.storage.set(`item:${item.id}`, JSON.stringify(item));
                items.push(item);
                
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                
                showStatus('Erfolgreich gespeichert! ✓', 'success');
                
                setTimeout(() => {
                    switchTab('list');
                }, 1000);
            } catch (error) {
                showStatus('Fehler beim Speichern', 'error');
            }
        }

        function displayItems() {
            const listContainer = document.getElementById('items-list');
            
            if (items.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">Noch keine Einträge vorhanden</div>';
                return;
            }

            const sortedItems = [...items].sort((a, b) => b.id - a.id);
            
            listContainer.innerHTML = sortedItems.map(item => `
                <div class="list-item">
                    <h3>${escapeHtml(item.title)}</h3>
                    ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
                    <p style="font-size: 12px; color: #999; margin-top: 8px;">${item.timestamp}</p>
                </div>
            `).join('');
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Beim Laden der App
        loadItems();
    </script>
</body>
</html>
