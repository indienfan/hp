<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gesichter">
    <meta name="theme-color" content="#FFD700">

    <title>Barbaras Heino und Peter</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #fffaf0, #e8e0d5);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        #container {
            display: flex; width: 100%; height: 100%;
            justify-content: center; align-items: center; gap: 5vw;
        }

        .face-frame {
            width: 38vw; height: 55vh;
            max-width: 450px; max-height: 600px;
            border: 15px solid #ffffff; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background-size: cover; background-position: center;
            background-color: #ddd;
            cursor: pointer; will-change: transform;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .playing {
            border-color: #FFD700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
            z-index: 10;
        }

        #countdown {
            position: fixed;
            top: max(20px, env(safe-area-inset-top, 20px)); left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #FFD700;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 15px; font-weight: bold;
            display: none;
            z-index: 9999;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="countdown"></div>

    <div id="container">
        <div id="left"  class="face-frame"
             ontouchstart="handleTap(1, event)"
             onclick="handleTap(1, event)"
             style="background-image: url('links.jpg');"></div>

        <div id="right" class="face-frame"
             ontouchstart="handleTap(2, event)"
             onclick="handleTap(2, event)"
             style="background-image: url('rechts.jpg');"></div>
    </div>

    <script>
        // ── Service Worker ───────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .catch(err => console.warn('SW:', err));
            });
        }

        // ── Klick-Sperre (20 Sekunden) ───────────────────────────────
        const LOCKOUT_MS = 20000;
        let locked = false;
        let countdownInterval = null;
        const countdownEl = document.getElementById('countdown');

        function startLockout() {
            locked = true;
            const endTime = Date.now() + LOCKOUT_MS;
            countdownEl.style.display = 'block';
            countdownInterval = setInterval(() => {
                const remaining = Math.ceil((endTime - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    countdownEl.style.display = 'none';
                    locked = false;
                } else {
                    countdownEl.textContent = '⏳ ' + remaining + ' s';
                }
            }, 200);
        }

        // ── Audio ────────────────────────────────────────────────────
        window.AudioContext = window.AudioContext || window.webkitAudioContext;

        let audioCtx       = null;
        let currentPlaying = 0;
        let audios         = { 1: null, 2: null };
        let sources        = { 1: null, 2: null };
        let analysers      = { 1: null, 2: null };
        let animationId    = null;
        let tapped         = false;

        function handleTap(id, event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }

            // touchstart und click feuern beide auf iOS – nur einmal verarbeiten
            if (event.type === 'touchstart') {
                tapped = true;
            } else if (event.type === 'click') {
                if (tapped) { tapped = false; return; }
            }

            if (locked) return;

            // AudioContext + Audio-Objekte beim ersten Klick anlegen
            // (muss synchron im Gesture-Handler passieren – iOS-Pflicht!)
            if (!audioCtx) {
                audioCtx = new AudioContext();
                audios[1] = new Audio('links.mp3');
                audios[2] = new Audio('rechts.mp3');
                audios[1].loop = true;
                audios[2].loop = true;
            }

            // resume() sofort – KEIN await / .then() – iOS bricht sonst ab
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // play() ebenfalls direkt im Gesture-Handler
            playAudio(id);
        }

        function playAudio(id) {
            try {
                if (!sources[id]) {
                    sources[id]   = audioCtx.createMediaElementSource(audios[id]);
                    analysers[id] = audioCtx.createAnalyser();
                    analysers[id].fftSize = 256;
                    analysers[id].smoothingTimeConstant = 0.8;
                    sources[id].connect(analysers[id]);
                    analysers[id].connect(audioCtx.destination);
                }

                if (currentPlaying === id) {
                    pauseAll();
                } else {
                    pauseAll();
                    const p = audios[id].play();
                    if (p !== undefined) {
                        p.then(() => {
                            currentPlaying = id;
                            document.getElementById(id === 1 ? 'left' : 'right')
                                    .classList.add('playing');
                            animate();
                            startLockout();
                        }).catch(err => console.warn('Play:', err));
                    }
                }
            } catch(e) {
                console.error('Audio Error:', e);
            }
        }

        function pauseAll() {
            if (animationId) cancelAnimationFrame(animationId);
            [1, 2].forEach(i => {
                if (audios[i]) { audios[i].pause(); audios[i].currentTime = 0; }
            });
            document.querySelectorAll('.face-frame').forEach(f => {
                f.classList.remove('playing');
                f.style.transform = 'scale(1)';
            });
            currentPlaying = 0;
        }

        function animate() {
            if (!currentPlaying || !analysers[currentPlaying]) return;
            const data = new Uint8Array(analysers[currentPlaying].frequencyBinCount);
            analysers[currentPlaying].getByteFrequencyData(data);
            let sum = 0;
            const n = Math.min(30, data.length);
            for (let i = 0; i < n; i++) sum += data[i];
            const scale = 1 + (sum / n / 800);
            document.getElementById(currentPlaying === 1 ? 'left' : 'right')
                    .style.transform = `scale(${scale})`;
            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('touchmove', e => {
            if (e.target.tagName !== 'INPUT') e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
